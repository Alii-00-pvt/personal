<!DOCTYPE html>
<html lang="en" data-theme="theme-dark">
<head>
<meta charset="UTF-8">
<title>The Count</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bgTop:#0d0d0f;
  --bgMid:#0a0a0c;
  --bgBottom:#060607;

  --text:rgba(255,255,255,0.92);
  --muted:rgba(255,255,255,0.70);
  --muted2:rgba(255,255,255,0.52);

  --panel:rgba(255,255,255,0.055);
  --panelBorder:rgba(255,255,255,0.12);

  --edge:rgba(255,255,255,0.16);

  --quoteColor:var(--muted);
  --titleFont:"Caveat",cursive;
  --digitFont:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --tagFont:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

  --themeBtnBg:rgba(255,255,255,0.08);
  --themeBtnBorder:rgba(255,255,255,0.18);
  --themeBtnText:rgba(255,255,255,0.9);
}

html[data-theme="theme-dark"]{
  --bgTop:#0d0d0f;
  --bgMid:#0a0a0c;
  --bgBottom:#060607;
}

html[data-theme="theme-minimal"]{
  --bgTop:#efefef;
  --bgMid:#ebebeb;
  --bgBottom:#e8e8e8;

  --text:rgba(10,10,10,0.94);
  --muted:rgba(0,0,0,0.64);
  --muted2:rgba(0,0,0,0.50);

  --panel:rgba(255,255,255,0.42);
  --panelBorder:rgba(0,0,0,0.05);
  --edge:transparent;

  --quoteColor:rgba(0,0,0,0.62);

  --themeBtnBg:rgba(255,255,255,0.68);
  --themeBtnBorder:rgba(0,0,0,0.10);
  --themeBtnText:rgba(0,0,0,0.86);
}

*{box-sizing:border-box;}

html, body{
  width:100%;
  max-width:100%;
  overflow-x:hidden;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(180deg,var(--bgTop),var(--bgMid),var(--bgBottom));
  color:var(--text);
  text-align:center;
  font-family:"Inter",system-ui;
  padding:24px 0;
}

.container{
  width:min(980px,94vw);
  padding:44px 18px 52px;
  position:relative;
}

.theme-toggle{
  position:absolute;
  top:8px;
  right:0;
  padding:10px 14px;
  border-radius:999px;
  border:1px solid var(--themeBtnBorder);
  background:var(--themeBtnBg);
  color:var(--themeBtnText);
  cursor:pointer;
}

.quote{
  margin-bottom:20px;
  direction:rtl;
}

h1{
  font-family:"Caveat",cursive;
}

.start-card{
  margin:20px auto;
  padding:16px;
  border-radius:18px;
  background:var(--panel);
  border:1px solid var(--panelBorder);
}

.now-list{
  margin-top:10px;
}

.scoreboard-inner{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.slot{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* hide rings in dark */
.slot svg{display:none;}

/* minimal rings */
html[data-theme="theme-minimal"] .slot svg{
  display:block;
  position:absolute;
  width:180px;
  transform:rotate(-55deg);
}

.ring-bg{
  fill:none;
  stroke:rgba(0,0,0,0.05);
  stroke-width:4;
}

.ring-progress{
  fill:none;
  stroke:#c1121f;
  stroke-width:4;
  stroke-linecap:round;
  stroke-dasharray:263.89;
  stroke-dashoffset:263.89;
}

.digit{
  font-size:3rem;
  font-weight:700;
  z-index:1;
}

.tag{
  margin-top:10px;
  z-index:1;
}
</style>
</head>

<body>

<div class="container">

<button class="theme-toggle" id="themeToggle">Theme: Dark</button>

<div class="quote">
اللَّهُمَّ إِنِّي قَدْ ارْتَكَبْتُ ذُنُوبًا عَظِيمَةً<br>
وَأَنْتَ عَظِيمُ الرَّحْمَةِ فَاغْفِرْ لِي وَتُبْ عَلَيَّ
</div>

<h1>The Count</h1>

<div class="start-card">
Start Date and Time (Manchester, UK):<br>
<strong>25 March 2026, 18:04 (GMT)</strong>

<div class="now-list">
<div id="nowManchester"></div>
<div id="nowJeddah"></div>
<div id="nowHyderabad"></div>
</div>
</div>

<div class="scoreboard-inner">
<div class="slot" data-unit="days">
<svg viewBox="0 0 100 100"><circle class="ring-bg" cx="50" cy="50" r="42"/><circle class="ring-progress" cx="50" cy="50" r="42"/></svg>
<div id="days" class="digit"></div><div class="tag">Days</div></div>

<div class="slot" data-unit="hours">
<svg viewBox="0 0 100 100"><circle class="ring-bg" cx="50" cy="50" r="42"/><circle class="ring-progress" cx="50" cy="50" r="42"/></svg>
<div id="hours" class="digit"></div><div class="tag">Hours</div></div>

<div class="slot" data-unit="minutes">
<svg viewBox="0 0 100 100"><circle class="ring-bg" cx="50" cy="50" r="42"/><circle class="ring-progress" cx="50" cy="50" r="42"/></svg>
<div id="minutes" class="digit"></div><div class="tag">Minutes</div></div>

<div class="slot" data-unit="seconds">
<svg viewBox="0 0 100 100"><circle class="ring-bg" cx="50" cy="50" r="42"/><circle class="ring-progress" cx="50" cy="50" r="42"/></svg>
<div id="seconds" class="digit"></div><div class="tag">Seconds</div></div>
</div>

</div>

<script>
const startTime = Date.UTC(2026,2,25,18,4,0);
const CIRCUMFERENCE = 2*Math.PI*42;

const themes=[
{key:"theme-dark",label:"Dark"},
{key:"theme-minimal",label:"Minimal"}
];

const btn=document.getElementById("themeToggle");
const root=document.documentElement;

function setTheme(t){
root.setAttribute("data-theme",t.key);
btn.textContent="Theme: "+t.label;
localStorage.setItem("countTheme",t.key);
}

btn.onclick=()=>{
let i=themes.findIndex(x=>x.key===root.getAttribute("data-theme"));
i=(i+1)%themes.length;
setTheme(themes[i]);
};

setTheme(themes.find(t=>t.key===localStorage.getItem("countTheme"))||themes[0]);

function updateClock(id,label,tz){
const now=new Date();
const date=now.toLocaleDateString("en-GB",{timeZone:tz});
const time=now.toLocaleTimeString("en-GB",{timeZone:tz});
document.getElementById(id).innerHTML=`${label}: <strong>${date}, ${time}</strong>`;
}

function setRing(unit,f){
const el=document.querySelector(`[data-unit="${unit}"] .ring-progress`);
if(!el)return;
el.style.strokeDashoffset=CIRCUMFERENCE*(1-f);
}

function updateTimer(){
const diff=Date.now()-startTime;
const s=Math.floor(diff/1000);

const d=Math.floor(s/86400);
const h=Math.floor((s%86400)/3600);
const m=Math.floor((s%3600)/60);
const sec=s%60;

days.textContent=d;
hours.textContent=h;
minutes.textContent=m;
seconds.textContent=sec;

setRing("days",(d%365)/365);
setRing("hours",h/24);
setRing("minutes",m/60);
setRing("seconds",sec/60);
}

function tick(){
updateClock("nowManchester","Manchester, UK","Europe/London");
updateClock("nowJeddah","Jeddah, Saudi Arabia","Asia/Riyadh");
updateClock("nowHyderabad","Hyderabad, India","Asia/Kolkata");
updateTimer();
}

tick();
setInterval(tick,1000);
</script>

</body>
</html>
